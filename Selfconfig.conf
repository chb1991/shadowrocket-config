[URL Rewrite]
# 微博
^https?:\/\/sdkapp\.uve\.weibo\.com\/interface\/sdk\/sdkad\.php(?:\?|$) - reject-dict

# 网易云音乐
^https?:\/\/(?:ipv4|interface\d*)\.music\.163\.com\/eapi\/ad\/(?:config\/get|get)(?:\?|$) - reject-dict
^https?:\/\/(?:ipv4|interface\d*)\.music\.163\.com\/api\/ad(?:\?|$) - reject-dict

# 拼多多
^https?:\/\/api\.(?:pinduoduo|yangkeduo)\.com\/api\/cappuccino\/splash(?:\?|$) - reject-dict

# 闲鱼：覆盖 idlecommerce.splash.ads 以及新版阿里系 MTop 开屏接口变体；仅匹配 splash。
^https:\/\/(?:acs|guide-acs)\.m\.goofish\.com\/gw\/mtop\.[^\/?]*splash[^\/?]*(?:\/|\?|$) - reject-dict

# 虎牙
^https?:\/\/business\.msstatic\.com\/advertiser\/material(?:\?|$) - reject-dict
^https?:\/\/cdnfile1\.msstatic\.com\/cdnfile\/appad\/ - reject-img

[Body Rewrite]
# 酷安：仅删除开屏 entityId=945；如果导入时报不支持，可删除本段，不影响其他 App。
http-response-jq ^https?:\/\/api\.coolapk\.com\/v6\/main\/init(?:\?|$) 'if (.data | type) == "array" then .data |= map(select((.entityId | tostring) != "945")) else . end'

[Script]
