小红书开屏 = type=http-response, pattern=^https?:\/\/edith\.xiaohongshu\.com\/api\/sns\/v\d+\/system_service\/splash_config(?:\?|$), script-path=https://raw.githubusercontent.com/fmz200/wool_scripts/3b283a322937c5970f9837f0acc87bf2adf876a5/Scripts/xiaohongshu/xiaohongshu.js, requires-body=true, timeout=10

