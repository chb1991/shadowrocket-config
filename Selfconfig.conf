京东开屏 = type=http-response, pattern=^https:\/\/api\.m\.jd\.com\/client\.action\?.*functionId=start(?:&|$), script-path=https://raw.githubusercontent.com/fmz200/wool_scripts/3b283a322937c5970f9837f0acc87bf2adf876a5/Scripts/jingdong/jingdong.js, requires-body=true, timeout=10

# 什么值得买
什么值得买开屏 = type=http-response, pattern=^https?:\/\/app-api\.smzdm\.com\/util\/loading(?:\?|$), script-path=https://raw.githubusercontent.com/fmz200/wool_scripts/3b283a322937c5970f9837f0acc87bf2adf876a5/Scripts/smzdm/Smzdm.js, requires-body=true, timeout=10

# 高德地图
高德地图开屏 = type=http-response, pattern=^https:\/\/m5\.amap\.com\/ws\/valueadded\/alimama\/splash_screen\?, script-path=https://raw.githubusercontent.com/Moli-X/Resources/82b6420b9eb16b9d9324cd712afddd51243b7798/Script/Amap.js, requires-body=true, timeout=10

# 淘宝
淘宝开屏视频 = type=http-response, pattern=^https:\/\/guide-acs\.m\.taobao\.com\/gw\/mtop\.taobao\.cloudvideo\.video\.query, script-path=https://raw.githubusercontent.com/fmz200/wool_scripts/3b283a322937c5970f9837f0acc87bf2adf876a5/Scripts/myBlockAds.js, requires-body=true, timeout=10
